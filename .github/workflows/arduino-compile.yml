name: Arduino Compile

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/arduino-compile.yml"
      - "ESP_LoraReceiver/**"
      - "ESP_Mesh_BME280/**"
      - "ESP_Mesh_DHT11/**"
      - "ESP_Mesh_DHT22/**"
      - "ESP_Mesh_DS18B20_Lora/**"
      - "libraries/MeshDebug/**"
      - "libraries/MeshRouting/**"
  pull_request:
    paths:
      - ".github/workflows/arduino-compile.yml"
      - "ESP_LoraReceiver/**"
      - "ESP_Mesh_BME280/**"
      - "ESP_Mesh_DHT11/**"
      - "ESP_Mesh_DHT22/**"
      - "ESP_Mesh_DS18B20_Lora/**"
      - "libraries/MeshDebug/**"
      - "libraries/MeshRouting/**"

concurrency:
  group: arduino-compile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ARDUINO_BUILD_CACHE_PATH: /home/runner/.cache/arduino/build-cache
      ARDUINO_BUILD_CACHE_COMPILATIONS_BEFORE_PURGE: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Arduino packages and libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/.cache/arduino
            ~/.config/arduino
            ~/Arduino/libraries
          key: arduino-${{ runner.os }}-${{ hashFiles('.github/workflows/arduino-compile.yml') }}
          restore-keys: |
            arduino-${{ runner.os }}-

      - name: Compile sketches
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          verbose: false
          platforms: |
            - name: esp32:esp32
              source-url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          libraries: |
            - source-url: https://gitlab.com/painlessMesh/painlessMesh.git
              version: v1.5.7
              destination-name: painlessMesh
            - source-url: https://github.com/ESP32Async/AsyncTCP.git
              destination-name: AsyncTCP
            - name: TaskScheduler
            - name: ArduinoJson
            - name: LoRa
            - name: OneWire
            - name: DallasTemperature
            - name: DHT sensor library
            - name: Adafruit BME280 Library
            - name: Adafruit Unified Sensor
            - name: Adafruit BusIO
            - name: Adafruit GFX Library
            - name: Adafruit SSD1306
          sketch-paths: |
            - ESP_Mesh_DHT11
            - ESP_Mesh_DHT22
            - ESP_Mesh_BME280
            - ESP_Mesh_DS18B20_Lora
            - ESP_LoraReceiver
